networks:
  app-network:
    driver: bridge

services:

  backend:
    build: ./ReViSE-backend
    container_name: revise-backend
    restart: always
    networks:
      - app-network
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    expose:
      - "8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - app-network
    depends_on:
      - backend
    volumes:
      - ./ReViSE-backend/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - app-network
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ReViSE-backend/grafana/provisioning:/etc/grafana/provisioning
      - ./ReViSE-backend/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3030:3000"
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

  frontend:
    build:
      context: ./ReViSE-frontend
      args:
        NEXT_PUBLIC_API_URL: https://test-revise.org
    container_name: revise-frontend
    restart: always
    networks:
      - app-network
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
      - grafana
    networks:
      - app-network

volumes:
  prometheus-data:
  grafana-data: